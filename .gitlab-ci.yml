stages:
  - build
  - lint_format
  - migrate
  - tests
  - deploy

default:
  before_script:
    - test -f "$ENV" || (echo "ENV is not a file variable"; exit 1)
    - test -f "$ENV_TEST" || (echo "ENV_TEST is not a file variable"; exit 1)
    - cp "$ENV" .env
    - cp "$ENV_TEST" .env.test

build-job:
  stage: build
  script:
    - docker build -t booking-api-image:latest -t booking-api-image .

lint-job:
  stage: lint_format
  script:
    - docker compose -f docker-compose.ci.yaml run --rm backend poetry run ruff check

format-job:
  stage: lint_format
  script:
    - docker compose -f docker-compose.ci.yaml run --rm backend poetry run ruff format --check

migrate-job:
  stage: migrate
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker compose -f docker-compose.yaml up -d postgres redis
    - docker compose -f docker-compose.ci.yaml run --rm backend poetry run alembic -c /app/alembic.ini upgrade head

tests-job:
  stage: tests
  script:
    - |
      set -e
      : > pytest.log
      run_batch() {
        batch_name="$1"
        shift
        container_name="ci_${batch_name}_${CI_JOB_ID}"
        echo "Running pytest for ${batch_name}: $*" | tee -a pytest.log
        set +e
        APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml run --name "$container_name" backend poetry run pytest -vv --tb=long --maxfail=1 "$@" >> pytest.log 2>&1
        rc=$?
        set -e
        if [ $rc -ne 0 ]; then
          echo "Pytest ${batch_name} failed with exit code ${rc}" | tee -a pytest.log
          echo "===== docker logs: ${container_name} =====" | tee -a pytest.log
          docker logs "$container_name" >> pytest.log 2>&1 || true
          echo "===== docker inspect: ${container_name} =====" | tee -a pytest.log
          docker inspect "$container_name" >> pytest.log 2>&1 || true
          echo "===== docker diagnostics =====" | tee -a pytest.log
          docker ps -a >> pytest.log 2>&1 || true
          docker stats --no-stream >> pytest.log 2>&1 || true
          cat pytest.log
          docker rm -f "$container_name" >/dev/null 2>&1 || true
          exit $rc
        fi
        docker rm -f "$container_name" >/dev/null 2>&1 || true
      }
      run_batch batch1 tests/api/auth tests/api/facilities tests/api/hotels
      run_batch batch2 tests/api/bookings tests/services tests/utils
      cat pytest.log
  artifacts:
    when: always
    paths:
      - pytest.log

deploy-job:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker compose -f docker-compose.ci.yaml up -d
    - |
      if [ "$(docker inspect -f '{{.State.Running}}' hotels_nginx 2>/dev/null || echo false)" = "true" ]; then
        docker exec hotels_nginx nginx -s reload
      else
        echo "hotels_nginx is not running in current Docker context, skip nginx step"
      fi
    
