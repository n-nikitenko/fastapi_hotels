

variables:
  APP_IMAGE: fastapi-hotels:${CI_COMMIT_SHORT_SHA}

stages:
  - build
  - deploy

build-job:
  stage: build
  before-script:
    - cp ${ENV} .env
    - cp ${ENV_TEST} .env.test
  script:
    - docker build -t "$APP_IMAGE" .

deploy-job:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker compose -f docker-compose.ci.yaml up -d --no-build
    - docker compose -f docker-compose.ci.yaml ps
