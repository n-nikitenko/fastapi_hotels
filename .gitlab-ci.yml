stages:
  - build
  - lint_format
  - migrate
  - tests
  - deploy

default:
  before_script:
    - test -f "$ENV" || (echo "ENV is not a file variable"; exit 1)
    - test -f "$ENV_TEST" || (echo "ENV_TEST is not a file variable"; exit 1)
    - cp "$ENV" .env
    - cp "$ENV_TEST" .env.test

build-job:
  stage: build
  script:
    - docker build -t booking-api-image:latest -t booking-api-image .

lint-job:
  stage: lint_format
  script:
    - docker compose -f docker-compose.ci.yaml run --rm backend poetry run ruff check

format-job:
  stage: lint_format
  script:
    - docker compose -f docker-compose.ci.yaml run --rm backend poetry run ruff format --check

migrate-job:
  stage: migrate
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker compose -f docker-compose.yaml up -d postgres redis
    - docker compose -f docker-compose.ci.yaml run --rm backend poetry run alembic -c /app/alembic.ini upgrade head

tests-job:
  stage: tests
  script:
    - |
      set -e
      run_pytest() {
        APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml run --rm backend poetry run pytest -v "$@"
      }
      if ! run_pytest tests/api/auth tests/api/facilities tests/api/hotels; then
        echo "Tests batch 1 failed. Collecting docker diagnostics..."
        docker ps -a || true
        docker stats --no-stream || true
        exit 1
      fi
      if ! run_pytest tests/api/bookings tests/services tests/utils; then
        echo "Tests batch 2 failed. Collecting docker diagnostics..."
        docker ps -a || true
        docker stats --no-stream || true
        exit 1
      fi

deploy-job:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker compose -f docker-compose.ci.yaml up -d
    - |
      if [ "$(docker inspect -f '{{.State.Running}}' hotels_nginx 2>/dev/null || echo false)" = "true" ]; then
        docker exec hotels_nginx nginx -s reload
      else
        echo "hotels_nginx is not running in current Docker context, skip nginx step"
      fi
    
