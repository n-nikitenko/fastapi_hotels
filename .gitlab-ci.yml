stages:
  - build
  - deploy

default:
  before_script:
    - test -f "$ENV" || (echo "ENV is not a file variable"; exit 1)
    - test -f "$ENV_TEST" || (echo "ENV_TEST is not a file variable"; exit 1)
    - cp "$ENV" .env
    - cp "$ENV_TEST" .env.test

build-job:
  stage: build
  script:
    - docker build -t booking-api-image .

deploy-job:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker compose -f docker-compose.ci.yaml up -d
    - |
      if [ "$(docker inspect -f '{{.State.Running}}' hotels_nginx 2>/dev/null || echo false)" = "true" ]; then
        docker exec hotels_nginx nginx -s reload
      elif docker inspect hotels_nginx >/dev/null 2>&1; then
        echo "hotels_nginx exists but is stopped, starting container"
        docker start hotels_nginx
      else
        echo "hotels_nginx is absent in current Docker context, skip nginx step"
      fi
    
