tests-job:
  stage: tests
  script:
    - |
      set -e
      APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml run --rm backend \
      python - <<'PY'
      import asyncio
      import os

      import asyncpg

      async def ensure_test_db() -> None:
          db_name = os.environ["POSTGRES_DB"]
          conn = await asyncpg.connect(
              user=os.environ["POSTGRES_USER"],
              password=os.environ["POSTGRES_PASSWORD"],
              host=os.environ["POSTGRES_HOST"],
              port=int(os.environ.get("POSTGRES_PORT", 5432)),
              database="postgres",
          )
          try:
              exists = await conn.fetchval(
                  "SELECT 1 FROM pg_database WHERE datname = $1",
                  db_name,
              )
              print(f"test db exists: {bool(exists)} ({db_name})")
              if not exists:
                  await conn.execute(f'CREATE DATABASE "{db_name}"')
                  print(f"created test db: {db_name}")
          finally:
              await conn.close()

      asyncio.run(ensure_test_db())
      PY
      APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml run --rm backend \
      poetry run pytest -s -v

deploy-job:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker compose -f docker-compose.ci.yaml up -d
    - |
      if [ "$(docker inspect -f '{{.State.Running}}' hotels_nginx 2>/dev/null || echo false)" = "true" ]; then
        docker exec hotels_nginx nginx -s reload
      else
        echo "hotels_nginx is not running in current Docker context, skip nginx step"
      fi
    
