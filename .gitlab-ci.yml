tests-job:
  stage: tests
  script:
    - |
      set -e
      : > pytest.log
      APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml config > compose.resolved.yaml
      grep -E "env_file|MODE|POSTGRES_DB|DATABASE_DSN" compose.resolved.yaml || true
      APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml run --rm backend \
      python -c "import os; [print(f'{k}={os.getenv(k)}') for k in ('MODE','POSTGRES_DB','DATABASE_DSN')]"
      APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml run --rm backend \
      python -c "from src.config import settings; print(f'MODE={settings.MODE}'); print(f'DATABASE_DSN={settings.DATABASE_DSN}'); assert settings.MODE == 'TEST'; assert settings.DATABASE_DSN.endswith('/test'), 'DATABASE_DSN must point to /test db'"
      APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml run --rm backend \
      poetry run pytest -vv --tb=long --maxfail=1 tests/api/auth tests/api/facilities tests/api/hotels >> pytest.log 2>&1
      APP_ENV_FILE=.env.test docker compose -f docker-compose.ci.yaml run --rm backend \
      poetry run pytest -vv --tb=long --maxfail=1 tests/api/bookings tests/services tests/utils >> pytest.log 2>&1
      cat pytest.log
  artifacts:
    when: always
    paths:
      - pytest.log

deploy-job:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker compose -f docker-compose.ci.yaml up -d
    - |
      if [ "$(docker inspect -f '{{.State.Running}}' hotels_nginx 2>/dev/null || echo false)" = "true" ]; then
        docker exec hotels_nginx nginx -s reload
      else
        echo "hotels_nginx is not running in current Docker context, skip nginx step"
      fi
    
