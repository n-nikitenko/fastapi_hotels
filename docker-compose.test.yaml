services:
  test_postgres:
    image: postgres:16-alpine
    container_name: test_hotels_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - test_hotels_network
    ports:
      - ${POSTGRES_PORT:-5432}:5432

  test_redis:
    image: redis:7-alpine
    container_name: test_hotels_redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "6379:6379"
    networks:
      - test_hotels_network

networks:
  test_hotels_network:
    driver: bridge