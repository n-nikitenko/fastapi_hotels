services:
  postgres:
    image: postgres:16-alpine
    container_name: hotels_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hotels_network
    ports:
      - ${POSTGRES_PORT:-5432}:5432
  redis:
    image: redis:7-alpine
    container_name: hotels_redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "6379:6379"
    networks:
      - hotels_network

  celery:
    build: .
    container_name: hotels_celery
    restart: unless-stopped
    command:  ["poetry", "run", "celery", "-A", "tasks.celery_app:celery_app", "worker", "-l", "info"]
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    networks:
      - hotels_network
    volumes:
      # Слева путь на ПК, справа — путь внутри контейнера
      - ./src/static/images:/app/src/static/images

  celery_beat:
    build: .
    container_name: hotels_celery_beat
    restart: unless-stopped
    command: [ "poetry", "run", "celery", "-A", "tasks.celery_app:celery_app", "beat", "-l", "info" ]
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    networks:
      - hotels_network

  backend:
    build: .
    container_name: hotels_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    networks:
      - hotels_network
    volumes:
      # Слева путь на ПК, справа — путь внутри контейнера
      - ./src/static/images:/app/src/static/images

  nginx_service:
    image: nginx
    container_name: hotels_nginx
    volumes:
      # Слева путь на ПК, справа — путь внутри контейнера
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    networks:
      - hotels_network

volumes:
  postgres_data:
networks:
  hotels_network:
    driver: bridge